<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Vi Phạm ATVSLĐ</title>
    <style>
        :root {
            --primary: #2c3e50;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --success: #27ae60;
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eaeff2; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 25px; border-bottom: 3px solid var(--danger); display: inline-block; width: 100%; padding-bottom: 10px; }

        /* Form Layout */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; background: var(--light); padding: 20px; border-radius: 10px; border: 1px solid #e0e6ed; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: #444; }
        input, select, textarea { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--info); box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; color: white; display: flex; align-items: center; gap: 6px; }
        .btn-save { background: var(--success); }
        .btn-update { background: var(--info); display: none; }
        .btn-cancel { background: #6c757d; display: none; }
        .btn-export { background: var(--primary); margin-left: auto; }

        /* Table */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1100px; }
        th { background: #f1f4f7; color: var(--primary); padding: 15px; text-align: left; font-size: 0.85rem; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
        tr:hover { background: #fdfdfd; }

        /* Badges */
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: white; }
        .lv-low { background: #27ae60; }     /* Nhẹ */
        .lv-medium { background: #f39c12; }  /* Trung bình */
        .lv-high { background: #e74c3c; }    /* Nghiêm trọng */
        
        .img-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: zoom-in; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚠️ HỆ THỐNG THEO DÕI VI PHẠM ATVSLĐ</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>Thời gian</label>
            <input type="datetime-local" id="thoiGian">
        </div>
        <div class="form-group">
            <label>Đơn vị vi phạm</label>
            <input type="text" id="donVi" placeholder="Tổ/Đội/Phòng">
        </div>
        <div class="form-group">
            <label>Người vi phạm</label>
            <input type="text" id="nguoiViPham" placeholder="Họ và tên">
        </div>
        <div class="form-group">
            <label>Mức độ</label>
            <select id="mucDo">
                <option value="Nhẹ">🟢 Nhẹ (Nhắc nhở)</option>
                <option value="Trung bình">🟡 Trung bình</option>
                <option value="Nghiêm trọng">🔴 Nghiêm trọng</option>
            </select>
        </div>
        <div class="form-group">
            <label>Số biên bản</label>
            <input type="text" id="soBB" placeholder="VD: BB-01">
        </div>
        <div class="form-group">
            <label>Hình thức kỷ luật</label>
            <input type="text" id="kyLuat" placeholder="VD: Phạt 500k">
        </div>
        <div class="form-group">
            <label>Nhắc nhở L1</label>
            <input type="date" id="nhac1">
        </div>
        <div class="form-group">
            <label>Nhắc nhở L2</label>
            <input type="date" id="nhac2">
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>Nội dung vi phạm & Quy định tham chiếu</label>
            <textarea id="noiDung" rows="2" placeholder="Mô tả hành vi và điều khoản vi phạm..."></textarea>
        </div>
        <div class="form-group">
            <label>Minh chứng (Ảnh)</label>
            <input type="file" id="hinhAnh" accept="image/*" onchange="previewImage(this)">
            <input type="hidden" id="hinhAnhBase64">
        </div>
    </div>

    <div class="btn-group">
        <button id="btnSave" class="btn-save" onclick="addItem()">➕ Thêm hồ sơ</button>
        <button id="btnUpdate" class="btn-update" onclick="updateItem()">💾 Lưu cập nhật</button>
        <button id="btnCancel" class="btn-cancel" onclick="resetForm()">Hủy</button>
        
        <button class="btn-export" onclick="exportData()">📥 Xuất Excel (CSV)</button>
        <button class="btn-export" style="background: #8e44ad;" onclick="document.getElementById('importFile').click()">📤 Nhập dữ liệu</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>THỜI GIAN / BB</th>
                    <th>ĐƠN VỊ / NHÂN SỰ</th>
                    <th>MỨC ĐỘ</th>
                    <th>NỘI DUNG VI PHẠM</th>
                    <th>KỶ LUẬT</th>
                    <th>NHẮC NHỞ</th>
                    <th>ẢNH</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="mainTable"></tbody>
        </table>
    </div>
</div>

<script>
    let dataList = JSON.parse(localStorage.getItem('atvslđ_v2')) || [];
    let currentEditIndex = -1;

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('hinhAnhBase64').value = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addItem() {
        const data = getInputs();
        if(!data.donVi || !data.nguoiViPham) return alert("Vui lòng nhập Đơn vị và Tên người vi phạm!");
        dataList.push(data);
        save();
    }

    function editItem(index) {
        currentEditIndex = index;
        const item = dataList[index];
        document.getElementById('thoiGian').value = item.thoiGian;
        document.getElementById('donVi').value = item.donVi;
        document.getElementById('nguoiViPham').value = item.nguoiViPham;
        document.getElementById('mucDo').value = item.mucDo;
        document.getElementById('soBB').value = item.soBB;
        document.getElementById('kyLuat').value = item.kyLuat;
        document.getElementById('nhac1').value = item.nhac1;
        document.getElementById('nhac2').value = item.nhac2;
        document.getElementById('noiDung').value = item.noiDung;
        document.getElementById('hinhAnhBase64').value = item.hinhAnh;

        document.getElementById('btnSave').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'flex';
        document.getElementById('btnCancel').style.display = 'flex';
    }

    function updateItem() {
        dataList[currentEditIndex] = getInputs();
        resetForm();
        save();
    }

    function getInputs() {
        return {
            thoiGian: document.getElementById('thoiGian').value,
            donVi: document.getElementById('donVi').value,
            nguoiViPham: document.getElementById('nguoiViPham').value,
            mucDo: document.getElementById('mucDo').value,
            soBB: document.getElementById('soBB').value,
            kyLuat: document.getElementById('kyLuat').value,
            nhac1: document.getElementById('nhac1').value,
            nhac2: document.getElementById('nhac2').value,
            noiDung: document.getElementById('noiDung').value,
            hinhAnh: document.getElementById('hinhAnhBase64').value
        };
    }

    function resetForm() {
        currentEditIndex = -1;
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        document.getElementById('btnSave').style.display = 'flex';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
    }

    function save() {
        localStorage.setItem('atvslđ_v2', JSON.stringify(dataList));
        render();
    }

    function render() {
        const tbody = document.getElementById('mainTable');
        tbody.innerHTML = dataList.map((item, index) => {
            const lvCls = item.mucDo === 'Nghiêm trọng' ? 'lv-high' : (item.mucDo === 'Trung bình' ? 'lv-medium' : 'lv-low');
            return `
                <tr>
                    <td>${item.thoiGian.replace('T', ' ')}<br><small><b>${item.soBB}</b></small></td>
                    <td><strong>${item.donVi}</strong><br>Người VP: ${item.nguoiViPham}</td>
                    <td><span class="badge ${lvCls}">${item.mucDo}</span></td>
                    <td style="max-width:300px">${item.noiDung}</td>
                    <td>${item.kyLuat}</td>
                    <td>
                        ${item.nhac1 ? `L1: ${item.nhac1}<br>` : ''}
                        ${item.nhac2 ? `L2: ${item.nhac2}` : ''}
                    </td>
                    <td>${item.hinhAnh ? `<img src="${item.hinhAnh}" class="img-thumb" onclick="window.open(this.src)">` : '---'}</td>
                    <td>
                        <button onclick="editItem(${index})" style="background:none; color:#3498db; padding:5px;">✏️</button>
                        <button onclick="deleteItem(${index})" style="background:none; color:#e74c3c; padding:5px;">🗑️</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function deleteItem(index) {
        if(confirm("Xóa hồ sơ này?")) {
            dataList.splice(index, 1);
            save();
        }
    }

    function exportData() {
        let csv = "\uFEFFThời gian,Số BB,Đơn vị,Người VP,Mức độ,Nội dung,Kỷ luật,Nhắc 1,Nhắc 2\n";
        dataList.forEach(i => csv += `"${i.thoiGian}","${i.soBB}","${i.donVi}","${i.nguoiViPham}","${i.mucDo}","${i.noiDung}","${i.kyLuat}","${i.nhac1}","${i.nhac2}"\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "BaoCao_ViPham.csv";
        link.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const rows = event.target.result.split("\n").slice(1);
            rows.forEach(row => {
                const c = row.split('","').map(x => x.replace(/"/g, ''));
                if(c.length >= 9) dataList.push({thoiGian:c[0], soBB:c[1], donVi:c[2], nguoiViPham:c[3], mucDo:c[4], noiDung:c[5], kyLuat:c[6], nhac1:c[7], nhac2:c[8].trim(), hinhAnh:''});
            });
            save();
        };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
